name: Linux Gluten Build

on:
  push:
    branches:
      - "gluten-0530"
    paths:
      - "velox/**"
      - "!velox/docs/**"
      - "CMakeLists.txt"
      - "CMake/**"
      - "third_party/**"
      - ".github/workflows/linux-gluten-build.yml"

  pull_request:
    types:
      - opened
      - reopened
      - synchronize
    paths:
      - "velox/**"
      - "!velox/docs/**"
      - "CMakeLists.txt"
      - "CMake/**"
      - "third_party/**"
      - ".github/workflows/linux-gluten-build.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.repository }}-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

jobs:
  linux-gluten:
    name: Build Velox for Gluten
    runs-on: ubuntu-latest
    container: ghcr.io/lgbo-ustc/velox4j:sse-v1
    defaults:
      run:
        shell: bash
    env:
      CCACHE_DIR: "${{ github.workspace }}/ccache"
      VELOX_DEPENDENCY_SOURCE: SYSTEM
      CPU_TARGET: sse
      GTest_SOURCE: BUNDLED
      simdjson_SOURCE: BUNDLED
      xsimd_SOURCE: BUNDLED
      folly_SOURCE: BUNDLED
      geos_SOURCE: BUNDLED
      RocksDB_SOURCE: BUNDLED
      absl_SOURCE: BUNDLED
      gRPC_SOURCE: BUNDLED
      PulsarClient_SOURCE: BUNDLED
      USE_CLANG: "false"
    steps:
      - uses: actions/checkout@v4

      - name: Fix git permissions
        # Usually actions/checkout does this but as we run in a container
        # it doesn't work
        run: git config --global --add safe.directory ${GITHUB_WORKSPACE}

      - name: Ensure ccache directory exists
        run: mkdir -p "${CCACHE_DIR}"

      - name: Restore ccache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-linux-gluten-${{ runner.os }}-${{ env.CPU_TARGET }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ccache-linux-gluten-${{ runner.os }}-${{ env.CPU_TARGET }}-${{ github.ref_name }}-
            ccache-linux-gluten-${{ runner.os }}-${{ env.CPU_TARGET }}-

      - name: Zero Ccache Statistics
        run: ccache -sz

      - name: CPU info
        run: |
          nproc
          lscpu
          grep -m1 '^flags' /proc/cpuinfo

      - name: Configure Build
        run: |
          EXTRA_CMAKE_FLAGS=(
            "-DCMAKE_BUILD_TYPE=Release"
            "-DCMAKE_PREFIX_PATH=/usr/local"
            "-DBoost_DIR=/usr/local/lib/cmake/Boost-1.84.0"
            "-DVELOX_MONO_LIBRARY=ON"
            "-DVELOX_BUILD_SHARED=ON"
            "-DVELOX_BUILD_STATIC=OFF"
            "-DVELOX_BUILD_TESTING=ON"
            "-DVELOX_ENABLE_ARROW=ON"
            "-DVELOX_ENABLE_KAFKA_CONNECTOR=ON"
            "-DVELOX_ENABLE_PULSAR_CONNECTOR=ON"
            "-DVELOX_ENABLE_CCACHE=ON"
            "-Dc-ares_SOURCE=BUNDLED"
          )

          cmake -S . -B _build/velox4j-like -GNinja "${EXTRA_CMAKE_FLAGS[@]}"

      - name: Build Velox
        run: cmake --build _build/velox4j-like --target velox -j$(nproc)

      - name: Ccache after build velox
        run: ccache -s

      - name: Build Tests
        run: cmake --build _build/velox4j-like -j$(nproc)

      - name: Ccache after build tests
        run: ccache -s

      - name: Save ccache
        uses: actions/cache/save@v4
        if: success()
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-linux-gluten-${{ runner.os }}-${{ env.CPU_TARGET }}-${{ github.ref_name }}-${{ github.sha }}

      - name: Run Tests
        timeout-minutes: 60
        run: >-
          ctest --test-dir _build/velox4j-like -j$(nproc) --output-on-failure
          --stop-on-failure --timeout 300

      - name: Diagnose first failed test
        if: failure()
        continue-on-error: true
        timeout-minutes: 10
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y gdb

          python3 - <<'PY'
          import json
          import os
          import subprocess
          import sys

          build_dir = "_build/velox4j-like"
          failed_log = os.path.join(build_dir, "Testing/Temporary/LastTestsFailed.log")

          if not os.path.exists(failed_log):
              print(f"{failed_log} does not exist")
              sys.exit(0)

          with open(failed_log, "r", encoding="utf-8") as stream:
              failed = [line.split(":", 1)[-1].strip() for line in stream if line.strip()]

          if not failed:
              print(f"No failed tests found in {failed_log}")
              sys.exit(0)

          test_name = failed[0]
          print(f"Diagnosing first failed test: {test_name}")

          ctest_json = subprocess.check_output(
              ["ctest", "--test-dir", build_dir, "--show-only=json-v1"], text=True
          )
          tests = {test.get("name"): test for test in json.loads(ctest_json).get("tests", [])}
          test = tests.get(test_name)
          if not test:
              print(f"Could not find CTest metadata for {test_name}")
              sys.exit(0)

          command = test.get("command") or []
          print("CTest command:", command)
          if not command:
              sys.exit(0)

          executable = command[0]
          candidates = [executable]
          if not os.path.isabs(executable):
              candidates.append(os.path.join(build_dir, executable))

          binary = next(
              (path for path in candidates if os.path.isfile(path) and os.access(path, os.X_OK)),
              None,
          )
          if not binary:
              print(f"Could not find executable for {test_name}: {executable}")
              sys.exit(0)

          subprocess.run(["file", binary], check=False)
          subprocess.run(["ldd", binary], check=False)
          subprocess.run(
              [
                  "gdb",
                  "-batch",
                  "-ex",
                  "run",
                  "-ex",
                  "bt full",
                  "-ex",
                  "info registers",
                  "-ex",
                  "x/16i $pc-32",
                  "--args",
                  binary,
                  *command[1:],
              ],
              check=False,
          )
          PY
