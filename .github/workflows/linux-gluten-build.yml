name: Linux Gluten Build

on:
  push:
    branches:
      - "gluten-0530"
    paths:
      - "velox/**"
      - "!velox/docs/**"
      - "CMakeLists.txt"
      - "CMake/**"
      - "third_party/**"
      - ".github/workflows/linux-gluten-build.yml"

  pull_request:
    types:
      - opened
      - reopened
      - synchronize
    paths:
      - "velox/**"
      - "!velox/docs/**"
      - "CMakeLists.txt"
      - "CMake/**"
      - "third_party/**"
      - ".github/workflows/linux-gluten-build.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.repository }}-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

jobs:
  linux-gluten:
    name: Build Velox for Gluten
    runs-on: ubuntu-latest
    container: ghcr.io/lgbo-ustc/velox4j:latest
    defaults:
      run:
        shell: bash
    env:
      CCACHE_DIR: "${{ github.workspace }}/ccache"
      VELOX_DEPENDENCY_SOURCE: SYSTEM
      GTest_SOURCE: BUNDLED
      simdjson_SOURCE: BUNDLED
      xsimd_SOURCE: BUNDLED
      folly_SOURCE: BUNDLED
      geos_SOURCE: BUNDLED
      PulsarClient_SOURCE: BUNDLED
      USE_CLANG: "false"
    steps:
      - uses: actions/checkout@v4

      - name: Fix git permissions
        # Usually actions/checkout does this but as we run in a container
        # it doesn't work
        run: git config --global --add safe.directory ${GITHUB_WORKSPACE}

      - name: Ensure ccache directory exists
        run: mkdir -p "${CCACHE_DIR}"

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-linux-gluten-${{ runner.os }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ccache-linux-gluten-${{ runner.os }}-${{ github.ref_name }}-
            ccache-linux-gluten-${{ runner.os }}-
          save-always: true

      - name: Zero Ccache Statistics
        run: ccache -sz

      - name: Configure Build
        run: |
          EXTRA_CMAKE_FLAGS=(
            "-DCMAKE_BUILD_TYPE=Release"
            "-DCMAKE_PREFIX_PATH=/usr/local"
            "-DBoost_DIR=/usr/local/lib/cmake/Boost-1.84.0"
            "-DVELOX_MONO_LIBRARY=ON"
            "-DVELOX_BUILD_SHARED=ON"
            "-DVELOX_BUILD_STATIC=OFF"
            "-DVELOX_BUILD_TESTING=OFF"
            "-DVELOX_ENABLE_ARROW=ON"
            "-DVELOX_ENABLE_KAFKA_CONNECTOR=ON"
            "-DVELOX_ENABLE_PULSAR_CONNECTOR=ON"
            "-DVELOX_ENABLE_CCACHE=ON"
          )

          cmake -S . -B _build/velox4j-like -GNinja "${EXTRA_CMAKE_FLAGS[@]}"

      - name: Build Velox
        run: cmake --build _build/velox4j-like --target velox -j$(nproc)

      - name: Ccache after
        run: ccache -s
